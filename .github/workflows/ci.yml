name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Lint & Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Syntax check
        run: python -m py_compile backend/main.py backend/config.py backend/database.py
      - name: Import check
        run: |
          cd backend
          python -c "import main"
