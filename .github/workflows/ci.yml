name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Lint & Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Syntax check
        run: python -m py_compile backend/main.py backend/config.py backend/database.py
      - name: Import check
        run: |
          cd backend
          python -c "import main"
      - name: Run pytest suite
        run: |
          cd backend
          python -m pytest -v --cov=. --cov-report=term-missing:skip-covered

  docker-smoke-test:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Prepare environment
        run: cp .env.example .env
      - name: Build and start stack
        run: docker compose up -d --build
      - name: Wait for backend to become reachable
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/docs > /dev/null; then
              echo "Backend is up"
              exit 0
            fi
            sleep 2
          done
          echo "Backend never came up"
          docker compose logs
          exit 1
      - name: Tear down
        if: always()
        run: docker compose down
