services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: gardenflow-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/broker/uptime' -C 1 -W 3 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gardenflow-backend
    ports:
      - "8000:8000"
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      DB_PATH: /data/garden.db
    volumes:
      - ./backend:/app
      - ./frontend:/app/../frontend
      - garden_data:/data
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

volumes:
  garden_data:
