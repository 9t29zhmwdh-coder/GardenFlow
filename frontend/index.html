<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GardenFlow Dashboard</title>
  <link rel="stylesheet" href="/assets/style.css" />
  <!-- CDN: no build step required -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="/assets/app.js"></script>
</head>
<body x-data="gardenflow" x-init="init()">

  <header>
    <span style="font-size:1.6rem">🌱</span>
    <h1>GardenFlow</h1>
    <span class="badge" :class="connected ? 'ok' : 'err'" x-text="connected ? '● ' + t('live') : '○ ' + t('disconnected')"></span>
  </header>

  <main>

    <!-- Status bar -->
    <div class="card" style="display:flex;gap:24px;align-items:center;flex-wrap:wrap;">
      <div>
        <span style="font-size:.8rem;color:var(--muted)" x-text="t('zones')"></span>
        <div style="font-weight:700" x-text="zones.length ? zones.join(', ') : '-'"></div>
      </div>
      <div>
        <span style="font-size:.8rem;color:var(--muted)" x-text="t('sensors')"></span>
        <div style="font-weight:700" x-text="Object.keys(sensors).length"></div>
      </div>
      <div>
        <span style="font-size:.8rem;color:var(--muted)" x-text="t('rules')"></span>
        <div style="font-weight:700" x-text="rules.length"></div>
      </div>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button class="btn secondary" @click="toggleLang()" x-text="lang === 'en' ? 'DE' : 'EN'"></button>
        <button class="btn secondary" @click="loadRules()">⟳ <span x-text="t('refresh')"></span></button>
      </div>
    </div>

    <!-- Sensor cards per zone -->
    <template x-if="zones.length === 0">
      <div class="card" style="text-align:center;color:var(--muted);padding:40px">
        <span x-text="t('waitingSensors')"></span> <code>python tools/test_sensor.py</code> <span x-text="t('waitingSensorsSuffix')"></span>
      </div>
    </template>

    <template x-for="zone in zones" :key="zone">
      <div>
        <h2 style="font-size:.95rem;font-weight:700;margin-bottom:10px;color:var(--green)"
            x-text="zone.toUpperCase()"></h2>

        <!-- Sensor-Wert-Karten -->
        <div class="grid-2" style="margin-bottom:16px">
          <template x-for="s in zoneSensors(zone)" :key="s.type">
            <div class="card">
              <h2 x-text="label(s.type)"></h2>
              <div>
                <span class="sensor-value" x-text="s.value.toFixed(1)"></span>
                <span class="sensor-unit" x-text="s.unit"></span>
              </div>
              <div class="sensor-meta" x-text="new Date(s.ts).toLocaleTimeString()"></div>
              <div class="chart-wrap" style="margin-top:12px">
                <canvas :id="'chart-' + zone + '.' + s.type"></canvas>
              </div>
            </div>
          </template>
        </div>

        <!-- Manual pump control -->
        <div class="card" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <span style="font-weight:600" x-text="t('manualPump')"></span>
          <button class="btn" @click="pumpOn(zone, 10)">▶ 10 s</button>
          <button class="btn" @click="pumpOn(zone, 30)">▶ 30 s</button>
          <button class="btn" @click="pumpOn(zone, 60)">▶ 60 s</button>
          <button class="btn danger" @click="pumpOff(zone)">■ <span x-text="t('stop')"></span></button>
        </div>
      </div>
    </template>

    <!-- Rules overview -->
    <div class="card">
      <h2 x-text="t('automationRules')"></h2>
      <template x-if="rules.length === 0">
        <p style="color:var(--muted);font-size:.85rem;margin-top:8px">
          <span x-text="t('noRules')"></span> <code>POST /api/rules</code>.
        </p>
      </template>
      <template x-for="rule in rules" :key="rule.id">
        <div class="rule-row">
          <div style="flex:1">
            <div style="font-weight:600" x-text="rule.name"></div>
            <div style="font-size:.75rem;color:var(--muted)" x-text="ruleConditionSummary(rule)"></div>
            <div style="font-size:.75rem;color:var(--muted)"
                 x-text="'→ ' + rule.action.type + ' ' + rule.action.zone + (rule.action.duration_seconds ? ' (' + rule.action.duration_seconds + 's)' : '')"></div>
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            <label class="toggle">
              <input type="checkbox" :checked="rule.enabled" @change="toggleRule(rule)" />
              <span class="slider"></span>
            </label>
            <button class="btn danger" style="padding:5px 10px" @click="deleteRule(rule.id)">✕</button>
          </div>
        </div>
      </template>
    </div>

    <!-- API-Hinweis -->
    <div class="card" style="font-size:.8rem;color:var(--muted)">
      <strong>API:</strong>
      <code>GET /api/sensors</code> ·
      <code>GET /api/rules</code> ·
      <code>POST /api/rules</code> ·
      <code>POST /api/actuators/{zone}/pump</code> ·
      <code>WS /ws</code> ·
      <a href="/docs" style="color:var(--green)">Swagger UI →</a>
    </div>

  </main>
</body>
</html>
